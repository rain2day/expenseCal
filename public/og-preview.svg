<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark warm background gradient (matches app dark mode) -->
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#372A24"/>
      <stop offset="42%"  stop-color="#20232C"/>
      <stop offset="100%" stop-color="#1F2238"/>
    </linearGradient>

    <!-- Logo rounded-square gradient -->
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8913F"/>
      <stop offset="55%"  stop-color="#DD843C"/>
      <stop offset="100%" stop-color="#B86228"/>
    </linearGradient>

    <!-- Logo sheen -->
    <linearGradient id="logo-sheen" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Vertical divider fade -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(221,132,60,0)"/>
      <stop offset="25%"  stop-color="rgba(221,132,60,0.5)"/>
      <stop offset="75%"  stop-color="rgba(221,132,60,0.5)"/>
      <stop offset="100%" stop-color="rgba(221,132,60,0)"/>
    </linearGradient>

    <!-- Horizontal accent underline -->
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#DD843C"/>
      <stop offset="60%"  stop-color="rgba(221,132,60,0.3)"/>
      <stop offset="100%" stop-color="rgba(221,132,60,0)"/>
    </linearGradient>

    <!-- Geo shape fill for background -->
    <radialGradient id="geo-r1" cx="85%" cy="18%" r="42%">
      <stop offset="0%"   stop-color="rgba(152,101,63,0.18)"/>
      <stop offset="100%" stop-color="rgba(152,101,63,0)"/>
    </radialGradient>
    <radialGradient id="geo-r2" cx="10%" cy="85%" r="38%">
      <stop offset="0%"   stop-color="rgba(94,70,62,0.14)"/>
      <stop offset="100%" stop-color="rgba(94,70,62,0)"/>
    </radialGradient>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────────── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geo ambient glow blobs (mimic app's geo-bg) -->
  <ellipse cx="1050" cy="110" rx="380" ry="260"
           fill="url(#geo-r1)"
           transform="rotate(-22 1050 110)"/>
  <ellipse cx="120"  cy="530" rx="310" ry="220"
           fill="url(#geo-r2)"
           transform="rotate(18 120 530)"/>
  <!-- Subtle centre vignette -->
  <ellipse cx="600" cy="315" rx="480" ry="340"
           fill="rgba(37,40,62,0.08)"/>

  <!-- ── App icon (left) ─────────────────────────────────────────────── -->
  <!-- Outer glow ring -->
  <circle cx="242" cy="315" r="162"
          fill="none" stroke="rgba(221,132,60,0.18)" stroke-width="2"/>

  <!-- Rounded-square background -->
  <rect x="92" y="165" width="300" height="300" rx="68"
        fill="url(#logo-bg)"/>
  <!-- Glass sheen on logo -->
  <rect x="92" y="165" width="300" height="300" rx="68"
        fill="url(#logo-sheen)"/>

  <!-- White circle — Hinomaru / coin motif -->
  <circle cx="242" cy="315" r="108" fill="white" opacity="0.96"/>

  <!-- ¥ symbol (paths, brand orange on white) -->
  <g stroke="#DD843C" stroke-linecap="round" fill="none">
    <!-- Left diagonal arm -->
    <line x1="174" y1="235" x2="242" y2="342" stroke-width="26"/>
    <!-- Right diagonal arm -->
    <line x1="310" y1="235" x2="242" y2="342" stroke-width="26"/>
    <!-- Vertical stem -->
    <line x1="242" y1="337" x2="242" y2="413" stroke-width="26"/>
    <!-- Crossbar 1 -->
    <line x1="196" y1="364" x2="288" y2="364" stroke-width="19"/>
    <!-- Crossbar 2 -->
    <line x1="196" y1="396" x2="288" y2="396" stroke-width="19"/>
  </g>

  <!-- Sakura accent dots (logo corner) -->
  <circle cx="360" cy="188" r="11" fill="rgba(255,255,255,0.30)"/>
  <circle cx="378" cy="171" r="7"  fill="rgba(255,255,255,0.20)"/>
  <circle cx="344" cy="170" r="5"  fill="rgba(255,255,255,0.16)"/>

  <!-- ── Vertical divider ────────────────────────────────────────────── -->
  <line x1="462" y1="0" x2="462" y2="630"
        stroke="url(#divider-grad)" stroke-width="1.5"/>

  <!-- ── Text section (right) ───────────────────────────────────────── -->

  <!-- App name (Chinese) -->
  <text x="516" y="272"
        font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif"
        font-size="82" font-weight="700" letter-spacing="-1"
        fill="#EAEDFF">公數計算器</text>

  <!-- English label -->
  <text x="520" y="318"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="400" letter-spacing="4"
        fill="rgba(163,172,255,0.75)">GROUP EXPENSE CALCULATOR</text>

  <!-- Accent underline -->
  <line x1="516" y1="342" x2="1050" y2="342"
        stroke="url(#accent-line)" stroke-width="1.5"/>

  <!-- Tagline (Cantonese) -->
  <text x="516" y="408"
        font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"
        font-size="36" font-weight="500"
        fill="rgba(234,237,255,0.88)">輕鬆計公數，朋友唔鬧交</text>

  <!-- Feature pills -->
  <!-- Pill 1: 多幣種 -->
  <rect x="516" y="444" width="138" height="38" rx="19"
        fill="rgba(221,132,60,0.18)" stroke="rgba(221,132,60,0.36)" stroke-width="1"/>
  <text x="585" y="469"
        font-family="'Noto Sans TC',sans-serif"
        font-size="18" text-anchor="middle"
        fill="#F8AC75">多幣種支援</text>

  <!-- Pill 2: 行程記帳 -->
  <rect x="668" y="444" width="138" height="38" rx="19"
        fill="rgba(163,172,255,0.10)" stroke="rgba(163,172,255,0.22)" stroke-width="1"/>
  <text x="737" y="469"
        font-family="'Noto Sans TC',sans-serif"
        font-size="18" text-anchor="middle"
        fill="rgba(163,172,255,0.80)">行程記帳</text>

  <!-- Pill 3: 即時結算 -->
  <rect x="820" y="444" width="122" height="38" rx="19"
        fill="rgba(163,172,255,0.10)" stroke="rgba(163,172,255,0.22)" stroke-width="1"/>
  <text x="881" y="469"
        font-family="'Noto Sans TC',sans-serif"
        font-size="18" text-anchor="middle"
        fill="rgba(163,172,255,0.80)">即時結算</text>

  <!-- Brand watermark (bottom right) -->
  <text x="1120" y="590"
        font-family="'Noto Sans TC','PingFang TC',sans-serif"
        font-size="17" text-anchor="end"
        fill="rgba(152,160,200,0.30)">鳩遊日本</text>

  <!-- Orange bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" rx="0"
        fill="url(#accent-line)" opacity="0.7"/>
</svg>
