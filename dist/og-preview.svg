<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="50%" stop-color="#0A1220"/>
      <stop offset="100%" stop-color="#0D1526"/>
    </linearGradient>

    <!-- Diamond gradients -->
    <linearGradient id="f1" x1="0" y1="0" x2="60" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B5BA5" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#1A2B5F" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="f2" x1="30" y1="0" x2="90" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B4A8A" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0E2040" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="f3" x1="60" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A6E" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#0A1A3A" stop-opacity="0.38"/>
    </linearGradient>

    <!-- Dollar gradient -->
    <linearGradient id="dg" x1="12" y1="60" x2="108" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="42%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="58%" stop-color="rgba(255,255,255,0.80)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.28)"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="c1"><path d="M 17.83,50.67 L 36.17,21.33 Q 42,12 47.83,21.33 L 66.17,50.67 Q 72,60 66.17,69.33 L 47.83,98.67 Q 42,108 36.17,98.67 L 17.83,69.33 Q 12,60 17.83,50.67 Z"/></clipPath>
    <clipPath id="c2"><path d="M 35.83,50.67 L 54.17,21.33 Q 60,12 65.83,21.33 L 84.17,50.67 Q 90,60 84.17,69.33 L 65.83,98.67 Q 60,108 54.17,98.67 L 35.83,69.33 Q 30,60 35.83,50.67 Z"/></clipPath>
    <clipPath id="c3"><path d="M 53.83,50.67 L 72.17,21.33 Q 78,12 83.83,21.33 L 102.17,50.67 Q 108,60 102.17,69.33 L 83.83,98.67 Q 78,108 72.17,98.67 L 53.83,69.33 Q 48,60 53.83,50.67 Z"/></clipPath>
    <mask id="ml"><rect x="0" y="0" width="51" height="120" fill="white"/></mask>
    <mask id="mc"><rect x="51" y="0" width="18" height="120" fill="white"/></mask>
    <mask id="mr"><rect x="69" y="0" width="51" height="120" fill="white"/></mask>

    <!-- Ambient glow blobs -->
    <radialGradient id="gr1" cx="75%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(59,91,165,0.12)"/>
      <stop offset="100%" stop-color="rgba(59,91,165,0)"/>
    </radialGradient>
    <radialGradient id="gr2" cx="25%" cy="80%" r="40%">
      <stop offset="0%" stop-color="rgba(30,58,110,0.10)"/>
      <stop offset="100%" stop-color="rgba(30,58,110,0)"/>
    </radialGradient>

    <!-- Centred accent underline -->
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(59,91,165,0)"/>
      <stop offset="30%" stop-color="#3B5BA5"/>
      <stop offset="70%" stop-color="#3B5BA5"/>
      <stop offset="100%" stop-color="rgba(59,91,165,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="900" cy="120" rx="380" ry="260" fill="url(#gr1)" transform="rotate(-18 900 120)"/>
  <ellipse cx="300" cy="510" rx="310" ry="220" fill="url(#gr2)" transform="rotate(18 300 510)"/>

  <!-- Mark (centred, large) -->
  <svg x="450" y="50" width="300" height="300" viewBox="0 0 120 120" overflow="visible">
    <rect width="120" height="120" rx="26" fill="#0D1526" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <path d="M 17.83,50.67 L 36.17,21.33 Q 42,12 47.83,21.33 L 66.17,50.67 Q 72,60 66.17,69.33 L 47.83,98.67 Q 42,108 36.17,98.67 L 17.83,69.33 Q 12,60 17.83,50.67 Z" fill="url(#f1)" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#shadow)"/>
    <path d="M 35.83,50.67 L 54.17,21.33 Q 60,12 65.83,21.33 L 84.17,50.67 Q 90,60 84.17,69.33 L 65.83,98.67 Q 60,108 54.17,98.67 L 35.83,69.33 Q 30,60 35.83,50.67 Z" fill="url(#f2)" stroke="rgba(255,255,255,0.13)" stroke-width="1" filter="url(#shadow)"/>
    <path d="M 53.83,50.67 L 72.17,21.33 Q 78,12 83.83,21.33 L 102.17,50.67 Q 108,60 102.17,69.33 L 83.83,98.67 Q 78,108 72.17,98.67 L 53.83,69.33 Q 48,60 53.83,50.67 Z" fill="url(#f3)" stroke="rgba(255,255,255,0.07)" stroke-width="1" filter="url(#shadow)"/>
    <text clip-path="url(#c1)" mask="url(#ml)" x="60" y="60" text-anchor="middle" dominant-baseline="central" font-size="58" font-weight="800" font-family="'Inter','Helvetica Neue',Arial Black,sans-serif" fill="rgba(160,190,255,0.55)">$</text>
    <text clip-path="url(#c2)" mask="url(#mc)" x="60" y="60" text-anchor="middle" dominant-baseline="central" font-size="58" font-weight="800" font-family="'Inter','Helvetica Neue',Arial Black,sans-serif" fill="url(#dg)" filter="url(#glow)">$</text>
    <text clip-path="url(#c3)" mask="url(#mr)" x="60" y="60" text-anchor="middle" dominant-baseline="central" font-size="58" font-weight="800" font-family="'Inter','Helvetica Neue',Arial Black,sans-serif" fill="rgba(140,175,255,0.48)">$</text>
  </svg>

  <!-- App name (Chinese, centred) -->
  <text x="600" y="420"
    text-anchor="middle"
    font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif"
    font-size="82" font-weight="700" letter-spacing="-1"
    fill="#EAEDFF">旅行公費</text>

  <!-- Accent underline (centred) -->
  <line x1="350" y1="445" x2="850" y2="445" stroke="url(#accent-line)" stroke-width="1.5"/>

  <!-- Tagline (centred) -->
  <text x="600" y="490"
    text-anchor="middle"
    font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"
    font-size="32" font-weight="400"
    fill="rgba(234,237,255,0.70)">輕鬆計公數，朋友唔鬧交</text>

  <!-- Feature pills (centred row) -->
  <rect x="370" y="520" width="130" height="36" rx="18"
    fill="rgba(59,91,165,0.18)" stroke="rgba(59,91,165,0.36)" stroke-width="1"/>
  <text x="435" y="543"
    font-family="'Noto Sans TC',sans-serif"
    font-size="16" text-anchor="middle"
    fill="rgba(160,190,255,0.8)">多幣種支援</text>

  <rect x="518" y="520" width="116" height="36" rx="18"
    fill="rgba(163,172,255,0.10)" stroke="rgba(163,172,255,0.22)" stroke-width="1"/>
  <text x="576" y="543"
    font-family="'Noto Sans TC',sans-serif"
    font-size="16" text-anchor="middle"
    fill="rgba(163,172,255,0.80)">行程記帳</text>

  <rect x="652" y="520" width="116" height="36" rx="18"
    fill="rgba(163,172,255,0.10)" stroke="rgba(163,172,255,0.22)" stroke-width="1"/>
  <text x="710" y="543"
    font-family="'Noto Sans TC',sans-serif"
    font-size="16" text-anchor="middle"
    fill="rgba(163,172,255,0.80)">即時結算</text>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" rx="0" fill="url(#accent-line)" opacity="0.4"/>
</svg>
