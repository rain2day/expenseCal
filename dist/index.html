    <body>
      <script>
        // Sync dark mode class + theme-color before React loads to prevent FOUC
        try {
          var d = localStorage.getItem('gcd-dark');
          if (d === 'false') document.documentElement.classList.remove('dark');
          var isDark = d !== 'false';
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
          // Set theme-color meta to match bg preset for iOS status bar
          var tc = localStorage.getItem('gcd-theme');
          var bg = isDark ? '#2A2C35' : '#ECEEF7'; // default warm preset
          if (tc) {
            var cfg = JSON.parse(tc);
            var dk = {warm:'#2A2C35',slate:'#1A2030',forest:'#182818',plum:'#281830',midnight:'#181818',ocean:'#102030',rose:'#381420',amber:'#302008',teal:'#102A28'};
            var lt = {warm:'#ECEEF7',slate:'#EEF1F5',forest:'#EDF3ED',plum:'#F2EDF5',midnight:'#F0F0F0',ocean:'#EBF0F5',rose:'#F5ECF0',amber:'#F5F0E0',teal:'#E8F3F2'};
            bg = cfg.bgPreset === 'custom'
              ? (isDark ? cfg.customBgDark : cfg.customBgLight)
              : (isDark ? (dk[cfg.bgPreset]||'#2A2C35') : (lt[cfg.bgPreset]||'#ECEEF7'));
          }
          document.querySelector('meta[name="theme-color"]').setAttribute('content', bg);
          // Also set html background color immediately to prevent flash
          document.documentElement.style.backgroundColor = bg;
          if (document.body) {
            document.body.style.margin = '0';
            document.body.style.backgroundColor = bg;
          }
        } catch(e) {}
        // SPA redirect restore for GitHub Pages 404.html hack
        (function(l) {
          if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&')
            }).join('?');
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
            );
          }
        }(window.location))
      </script>
      <div id="root"></div>
    </body>
