<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm orange gradient background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8913F"/>
      <stop offset="55%" stop-color="#DD843C"/>
      <stop offset="100%" stop-color="#B86228"/>
    </linearGradient>

    <!-- Inner glow on circle edge -->
    <filter id="circle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(160,80,20,0.28)"/>
    </filter>

    <!-- Outer app-icon shadow -->
    <filter id="icon-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- ── App background: rounded square ─────────────────────────────── -->
  <rect width="512" height="512" rx="114" fill="url(#bg-grad)" filter="url(#icon-shadow)"/>

  <!-- Subtle inner highlight at top-left (glass sheen) -->
  <rect width="512" height="512" rx="114"
        fill="url(#sheen)" opacity="1">
    <defs>
      <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="80%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
        <stop offset="50%" stop-color="rgba(255,255,255,0.04)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
    </defs>
  </rect>

  <!-- ── White circle (Hinomaru / coin motif) ───────────────────────── -->
  <circle cx="256" cy="252" r="178" fill="white" filter="url(#circle-glow)" opacity="0.96"/>

  <!-- ── ¥ symbol (paths, orange on white) ─────────────────────────── -->
  <!-- Stroke colour matches brand primary -->
  <g stroke="#DD843C" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Left diagonal arm of ¥ -->
    <line x1="154" y1="106" x2="256" y2="272" stroke-width="48"/>

    <!-- Right diagonal arm of ¥ -->
    <line x1="358" y1="106" x2="256" y2="272" stroke-width="48"/>

    <!-- Vertical stem -->
    <line x1="256" y1="264" x2="256" y2="408" stroke-width="48"/>

    <!-- Crossbar 1 -->
    <line x1="178" y1="307" x2="334" y2="307" stroke-width="36"/>

    <!-- Crossbar 2 -->
    <line x1="178" y1="358" x2="334" y2="358" stroke-width="36"/>
  </g>

  <!-- ── Decorative accent: tiny sakura dots (top-right) ───────────── -->
  <circle cx="378" cy="134" r="14" fill="rgba(255,255,255,0.38)"/>
  <circle cx="402" cy="112" r="9"  fill="rgba(255,255,255,0.28)"/>
  <circle cx="356" cy="108" r="6"  fill="rgba(255,255,255,0.22)"/>
</svg>
